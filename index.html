<head>
    <meta charset="UTF-8">
    
    <!-- Иконки для PWA и Яндекс -->
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="apple-touch-icon-precomposed" href="icon-192.png">
    
    <!-- Мета-теги для мобильных -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="АД-Калькулятор">
    <meta name="theme-color" content="#007bff">
    
    <title>АД-Калькулятор</title>
    <link rel="manifest" href="manifest.json">
    
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f9;
            color: #333;
            margin: 0;
            padding: 15px;
        }

        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #007bff;
            margin: 0;
            font-size: 22px;
        }
        .header span {
            font-size: 12px;
            color: #888;
            background: #e9ecef;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);        }

        .card-title {
            font-weight: bold;
            color: #007bff;
            margin-bottom: 10px;
            font-size: 16px;
            border-bottom: 1px solid #eee;
            padding-bottom: 5px;
        }

        .input-group {
            margin-bottom: 10px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }

        input[type="number"] {
            width: 100%;
            box-sizing: border-box;
            padding: 14px;
            font-size: 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            outline: none;
            transition: 0.2s;
            background: #fafafa;
        }

        input:focus {
            border-color: #007bff;
            background: #fff;
        }

        .btn-calc {
            width: 100%;
            padding: 16px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;            box-shadow: 0 4px 12px rgba(0,123,255,0.3);
        }

        #result-box {
            display: none;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        .res-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-size: 18px;
        }
        .res-val {
            font-weight: bold;
            font-size: 22px;
        }

        .badge {
            text-align: center;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            margin: 15px 0;
            font-size: 18px;
        }

        #save-btn {
            width: 100%;
            padding: 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            display: none;
        }

        .saved-msg {
            text-align: center;
            color: #28a745;            font-weight: bold;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
