<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АД-Калькулятор</title>
    <meta name="theme-color" content="#007bff">
    <style>
        body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f4f6f9;color:#333;margin:0;padding:15px}
        .header{text-align:center;margin-bottom:20px}
        .header h1{color:#007bff;margin:0;font-size:22px}
        .card{background:#fff;border-radius:16px;padding:15px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,.05)}
        .card-title{font-weight:bold;color:#007bff;margin-bottom:10px;font-size:16px}
        .input-group{margin-bottom:10px}
        .input-group label{display:block;font-size:13px;color:#666;margin-bottom:4px}
        input[type="number"]{width:100%;box-sizing:border-box;padding:14px;font-size:18px;border:2px solid #e0e0e0;border-radius:12px;outline:none}
        .btn-calc{width:100%;padding:16px;background:#007bff;color:#fff;border:none;border-radius:14px;font-size:18px;font-weight:bold;cursor:pointer;margin:20px 0}
        #result-box{display:none;background:#fff;border-radius:16px;padding:20px;margin:20px 0}
        .badge{text-align:center;padding:12px;border-radius:10px;color:#fff;font-weight:bold;margin:15px 0}
    </style>
</head>
<body>
<div class="header"><h1>🩺 АД-Калькулятор</h1><span>v21.0 TEST</span></div>

<div class="card">
    <div class="card-title">Замер №1</div>
    <div class="input-group"><label>Верхнее</label><input type="number" id="s1" value="120"></div>
    <div class="input-group"><label>Нижнее</label><input type="number" id="d1" value="80"></div>
    <div class="input-group"><label>Пульс</label><input type="number" id="p1" value="70"></div>
</div>

<div class="card">
    <div class="card-title">Замер №2</div>
    <div class="input-group"><label>Верхнее</label><input type="number" id="s2" value="120"></div>
    <div class="input-group"><label>Нижнее</label><input type="number" id="d2" value="80"></div>
    <div class="input-group"><label>Пульс</label><input type="number" id="p2" value="70"></div>
</div>

<div class="card">
    <div class="card-title">Замер №3</div>
    <div class="input-group"><label>Верхнее</label><input type="number" id="s3" value="120"></div>
    <div class="input-group"><label>Нижнее</label><input type="number" id="d3" value="80"></div>
    <div class="input-group"><label>Пульс</label><input type="number" id="p3" value="70"></div>
</div>

<button class="btn-calc" onclick="testCalculate()">🔥 РАССЧИТАТЬ</button>

<div id="result-box">
    <h3>Результат:</h3>
    <p id="res-text"></p>
    <div class="badge" id="status-badge">Норма</div>
</div>

<script>
    console.log('Script loaded!');
    
    function testCalculate() {
        console.log('Button clicked!');
        alert('Кнопка работает!');
        
        const s1 = parseInt(document.getElementById('s1').value) || 0;
        const d1 = parseInt(document.getElementById('d1').value) || 0;
        const s2 = parseInt(document.getElementById('s2').value) || 0;
        const d2 = parseInt(document.getElementById('d2').value) || 0;
        const s3 = parseInt(document.getElementById('s3').value) || 0;
        const d3 = parseInt(document.getElementById('d3').value) || 0;
        
        const avgS = Math.round((s1 + s2 + s3) / 3);
        const avgD = Math.round((d1 + d2 + d3) / 3);
        
        document.getElementById('res-text').innerText = `Среднее АД: ${avgS} / ${avgD}`;
        document.getElementById('result-box').style.display = 'block';
        
        const badge = document.getElementById('status-badge');
        if (avgS >= 140 || avgD >= 90) {
            badge.innerText = '📈 Повышенное';
            badge.style.background = '#ffc107';
            badge.style.color = '#000';
        } else {
            badge.innerText = '✅ Норма';
            badge.style.background = '#4caf50';
        }
    }
</script>
</body>
</html>
