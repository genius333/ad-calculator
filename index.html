<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>АД-Калькулятор</title>
    
    <!-- PWA Мета-теги -->
    <meta name="theme-color" content="#2196f3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="АД-Калькулятор">

    <style>
        :root {
            --primary: #2196f3;
            --bg: #f5f7fa;
            --card-bg: #ffffff;
            --text: #333333;
            --text-light: #666666;
            --green: #4caf50;
            --radius: 16px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        h1 {
            text-align: center;
            font-size: 1.5rem;
            margin-bottom: 25px;
            color: var(--primary);
        }

        .measure-block {
            background: var(--card-bg);            padding: 15px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }

        .measure-title {
            font-weight: bold;
            margin-bottom: 10px;
            display: block;
            color: var(--primary);
            border-bottom: 2px solid #eee;
            padding-bottom: 5px;
        }

        .input-group {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        input {
            width: 100%;
            padding: 12px 5px;
            font-size: 1.1rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            text-align: center;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            border-color: var(--primary);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {            -webkit-appearance: none;
            margin: 0;
        }

        .btn-calc {
            width: 100%;
            padding: 18px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            background: var(--primary);
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(33, 150, 243, 0.4);
            margin-top: 10px;
            transition: transform 0.1s;
        }

        .btn-calc:active {
            transform: scale(0.98);
        }

        /* Блок результата */
        #result-block {
            display: none;
            background: var(--card-bg);
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
        }

        .result-val {
            font-weight: bold;
        }
        .status-badge {
            margin-top: 15px;
            padding: 12px;
            border-radius: 10px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
        }

        .error-msg {
            color: #f44336;
            text-align: center;
            margin-top: 10px;
            display: none;
            font-weight: 500;
        }

        /* НОВАЯ КНОПКА СОХРАНЕНИЯ */
        .btn-save {
            width: 100%;
            margin-top: 15px;
            padding: 12px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            background-color: #4CAF50; /* Зеленый */
            border: none;
            border-radius: 8px;
            cursor: pointer;
            display: none; /* Скрыта по умолчанию */
        }
        
        .save-feedback {
            margin-top: 10px;
            color: #4CAF50;
            font-weight: bold;
            display: none;
        }

        @media (max-width: 380px) {
            .input-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🩺 Расчёт среднего АД</h1>

    <!-- Замер 1 -->
    <div class="measure-block">
        <span class="measure-title">Замер №1</span>
        <div class="input-group">
            <div class="input-wrapper">
                <label>Систол.</label>
                <input type="number" inputmode="numeric" id="s1" placeholder="120">
            </div>
            <div class="input-wrapper">
                <label>Диаст.</label>
                <input type="number" inputmode="numeric" id="d1" placeholder="80">
            </div>
            <div class="input-wrapper">
                <label>Пульс</label>
                <input type="number" inputmode="numeric" id="p1" placeholder="70">
            </div>
        </div>
    </div>

    <!-- Замер 2 -->
    <div class="measure-block">
        <span class="measure-title">Замер №2</span>
        <div class="input-group">
            <div class="input-wrapper">
                <label>Систол.</label>
                <input type="number" inputmode="numeric" id="s2" placeholder="120">
            </div>
            <div class="input-wrapper">
                <label>Диаст.</label>
                <input type="number" inputmode="numeric" id="d2" placeholder="80">
            </div>
            <div class="input-wrapper">
                <label>Пульс</label>
                <input type="number" inputmode="numeric" id="p2" placeholder="70">
            </div>
        </div>
    </div>

    <!-- Замер 3 -->
    <div class="measure-block">
        <span class="measure-title">Замер №3</span>
        <div class="input-group">
            <div class="input-wrapper">
                <label>Систол.</label>
                <input type="number" inputmode="numeric" id="s3" placeholder="120">
            </div>
            <div class="input-wrapper">                <label>Диаст.</label>
                <input type="number" inputmode="numeric" id="d3" placeholder="80">
            </div>
            <div class="input-wrapper">
                <label>Пульс</label>
                <input type="number" inputmode="numeric" id="p3" placeholder="70">
            </div>
        </div>
    </div>

    <div class="error-msg" id="error-msg">⚠️ Заполните все 9 полей числами!</div>
    <button class="btn-calc" onclick="calculate()">Рассчитать</button>

    <div id="result-block">
        <div class="result-row">
            <span>Среднее АД:</span>
            <span class="result-val" id="res-bp">-- / --</span>
        </div>
        <div class="result-row">
            <span>Средний пульс:</span>
            <span class="result-val" id="res-pulse">--</span>
        </div>
        <div class="status-badge" id="status-badge">Норма</div>

        <!-- КНОПКА СОХРАНЕНИЯ (НОВАЯ) -->
        <button id="save-btn" class="btn-save" onclick="saveToHistory()">💾 Сохранить в историю</button>
        <div id="save-feedback" class="save-feedback">✅ Сохранено!</div>
    </div>
</div>

<script>
    // Переменные для хранения текущих результатов
    let currentAvgS = 0;
    let currentAvgD = 0;
    let currentAvgP = 0;

    function calculate() {
        // Получаем значения
        const s1 = Number(document.getElementById('s1').value);
        const d1 = Number(document.getElementById('d1').value);
        const p1 = Number(document.getElementById('p1').value);
        
        const s2 = Number(document.getElementById('s2').value);
        const d2 = Number(document.getElementById('d2').value);
        const p2 = Number(document.getElementById('p2').value);
        
        const s3 = Number(document.getElementById('s3').value);
        const d3 = Number(document.getElementById('d3').value);
        const p3 = Number(document.getElementById('p3').value);
        const errorMsg = document.getElementById('error-msg');
        const resultBlock = document.getElementById('result-block');
        const btnSave = document.getElementById('save-btn');
        const saveFeedback = document.getElementById('save-feedback');

        // Валидация
        const inputs = [s1, d1, p1, s2, d2, p2, s3, d3, p3];
        const isValid = inputs.every(val => val > 0);

        if (!isValid) {
            errorMsg.style.display = 'block';
            resultBlock.style.display = 'none';
            return;
        }

        errorMsg.style.display = 'none';

        // Расчет среднего
        currentAvgS = Math.round((s1 + s2 + s3) / 3);
        currentAvgD = Math.round((d1 + d2 + d3) / 3);
        currentAvgP = Math.round((p1 + p2 + p3) / 3);

        // Отображение
        document.getElementById('res-bp').textContent = `${currentAvgS} / ${currentAvgD}`;
        document.getElementById('res-pulse').textContent = currentAvgP;

        // Логика нормы ВОЗ
        const badge = document.getElementById('status-badge');
        
        if (currentAvgS >= 140 || currentAvgD >= 90) {
            badge.textContent = "⚠️ Гипертензия 2";
            badge.style.backgroundColor = "#f44336";
        } else if (currentAvgS >= 130 || currentAvgD >= 80) {
            badge.textContent = "🧡 Гипертензия 1";
            badge.style.backgroundColor = "#ff9800";
        } else if (currentAvgS >= 120 && currentAvgD < 80) {
            badge.textContent = "⚡ Повышенное";
            badge.style.backgroundColor = "#ffc107";
        } else {
            badge.textContent = "✅ Норма";
            badge.style.backgroundColor = "#4caf50";
        }

        resultBlock.style.display = 'block';
        
        // СБРОС СОСТОЯНИЯ КНОПКИ СОХРАНЕНИЯ
        btnSave.style.display = 'block'; // Показываем кнопку
        saveFeedback.style.display = 'none'; // Скрываем галочку, если была
    }
    // === НОВАЯ ФУНКЦИЯ: СОХРАНЕНИЕ В ИСТОРИЮ ===
    function saveToHistory() {
        // 1. Формируем дату и время в нужном формате (11.05.2026, 07:50)
        const now = new Date();
        const dateStr = now.toLocaleDateString('ru-RU') + ', ' + 
                        now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });

        // 2. Создаем объект записи
        const newRecord = {
            date: dateStr,
            systolic: currentAvgS,
            diastolic: currentAvgD,
            pulse: currentAvgP
        };

        // 3. Получаем старую историю (или пустой массив)
        let history = JSON.parse(localStorage.getItem('ad_history') || '[]');

        // 4. Добавляем новую запись в начало
        history.unshift(newRecord);

        // 5. Сохраняем обратно в localStorage
        localStorage.setItem('ad_history', JSON.stringify(history));

        // 6. Визуальная обратная связь
        const btnSave = document.getElementById('save-btn');
        const saveFeedback = document.getElementById('save-feedback');

        saveFeedback.style.display = 'block'; // Показать "Сохранено"
        btnSave.style.display = 'none'; // Скрыть кнопку
        
        // Через 2 секунды можно снова показать кнопку, если захотят сохранить повторно
        setTimeout(() => {
            saveFeedback.style.display = 'none';
            btnSave.style.display = 'block';
        }, 2000);
    }
</script>

</body>
</html>
